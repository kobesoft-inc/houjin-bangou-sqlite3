name: Update corporate number database

on:
  schedule:
    # 毎日 00:00 UTC (= 09:00 JST)
    - cron: "0 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-db:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check for new data
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST_AVAILABLE="$(python3 build_db.py --check-latest-date)"
          echo "latest_available=$LATEST_AVAILABLE" >> "$GITHUB_OUTPUT"

          RELEASED_TAG="$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName -q .tagName 2>/dev/null || true)"
          RELEASED_DATE="${RELEASED_TAG#db-}"

          if [ "$LATEST_AVAILABLE" = "$RELEASED_DATE" ]; then
            echo "最新データ($LATEST_AVAILABLE)は既にリリース済みです。"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "新しいデータ($LATEST_AVAILABLE)があります（リリース済み: ${RELEASED_DATE:-なし}）。"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build database
        if: steps.check.outputs.changed == 'true'
        run: python3 build_db.py -o houjin_bangou.db

      - name: Compress, split and checksum database
        if: steps.check.outputs.changed == 'true'
        run: python3 package_db.py houjin_bangou.db

      - name: Create GitHub Release
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          LATEST_AVAILABLE: ${{ steps.check.outputs.latest_available }}
        run: |
          TAG="db-${LATEST_AVAILABLE}"
          gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" houjin_bangou.db.gz* SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" \
            --title "法人番号データ ${LATEST_AVAILABLE}" \
            --notes "最終適用日: ${LATEST_AVAILABLE}"
